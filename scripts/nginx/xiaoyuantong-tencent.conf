server {
    listen 80;
    server_name your-domain.com www.your-domain.com 118.24.104.69;

    client_max_body_size 20m;

    # health check
    location = /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # default entry
    location = / {
        return 302 /admin/;
    }

    # admin web
    location /admin/ {
        alias /data/www/xiaoyuantong/admin-web/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    # merchant web
    location /merchant/ {
        alias /data/www/xiaoyuantong/merchant-web/dist/;
        try_files $uri $uri/ /merchant/index.html;
    }

    # uploads
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # unified api proxy
    # /api/auth/admin/login      -> /auth/admin/login
    # /api/merchant/auth/session -> /merchant/auth/session
    # /api/mini/post/list        -> /mini/post/list
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
